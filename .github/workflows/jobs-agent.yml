name: jobs-agent

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"
    - cron: "00 16 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install app dependencies
        run: poetry install --only main --no-interaction --no-ansi

      - name: Install Playwright Chromium
        run: poetry run playwright install --with-deps chromium

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run batch
        env:
          TZ: Europe/Paris
          KEYWORDS: python,fastapi,django,backend
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_USER: ${{ secrets.MAIL_SMTP_USER }}
          MAIL_SMTP_PASS: ${{ secrets.MAIL_SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOBS_API_KEY: change_me
          DB_PATH: data/jobs.db
        run: poetry run python -m app.batch

      - name: Commit DB changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add  -f data/jobs.db
          git diff --cached --quiet || git commit -m "chore(data): update jobs database"
          git push

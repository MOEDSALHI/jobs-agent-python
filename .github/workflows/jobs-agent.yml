name: jobs-agent

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"
    - cron: "00 12 * * *"
    - cron: "00 16 * * *"

concurrency:
  group: jobs-agent
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install app dependencies
        run: poetry install --only main --no-interaction --no-ansi

      - name: Install Playwright Chromium
        run: poetry run playwright install --with-deps chromium

      - name: Ensure state directory exists
        run: mkdir -p state

      - name: Ensure state file exists
        run: |
          if [ ! -f state/jobs.json ]; then
            echo '{"jobs":[]}' > state/jobs.json
          fi

      - name: Run batch
        env:
          TZ: Europe/Paris
          KEYWORDS: python,fastapi,django,backend
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_USER: ${{ secrets.MAIL_SMTP_USER }}
          MAIL_SMTP_PASS: ${{ secrets.MAIL_SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOBS_API_KEY: change_me
          STATE_PATH: state/jobs.json
        run: poetry run python -m app.batch

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/jobs.json
          git diff --cached --quiet || git commit -m "chore(state): update jobs state"
          git push